AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Mirai AI Talent Scout — MCP service v2

Globals:
  Function:
    Runtime: python3.12
    Architectures: [arm64]          # Graviton2 — 20% cheaper than x86
    MemorySize: 1024
    Timeout: 900                    # 15 min max — batch enrichment can take time
    Environment:
      Variables:
        BEDROCK_MODEL: eu.anthropic.claude-sonnet-4-5-20250929-v1:0
        BEDROCK_HAIKU_MODEL: eu.anthropic.claude-haiku-4-5-20251001-v1:0
        SUPABASE_URL: !Sub '{{resolve:secretsmanager:mirai-talent-scout/supabase:SecretString:url}}'
        SUPABASE_SERVICE_ROLE_KEY: !Sub '{{resolve:secretsmanager:mirai-talent-scout/supabase:SecretString:service_role_key}}'
        GITHUB_TOKENS: !Sub '{{resolve:secretsmanager:mirai-talent-scout/github:SecretString:tokens}}'
        APIFY_API_TOKEN: !Sub '{{resolve:secretsmanager:mirai-talent-scout/apify:SecretString:api_token}}'
        MCP_AUTH_SECRET: !Sub '{{resolve:secretsmanager:mirai-talent-scout/mcp:SecretString:auth_secret}}'
        LOG_LEVEL: INFO

Resources:

  TalentScoutFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: mirai-talent-scout
      Handler: mcp.handler.lambda_handler
      Description: Mirai AI Talent Scout — MCP service over HTTP
      # Provisioned concurrency = no cold start for recruiter-facing tool
      AutoPublishAlias: live
      ProvisionedConcurrencyConfig:
        ProvisionedConcurrentExecutions: 1
      Policies:
        - AWSLambdaBasicExecutionRole
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
                - bedrock:InvokeModelWithResponseStream
              Resource:
                # Cross-region inference profiles (eu.*) route to any EU region — wildcard region required.
                - arn:aws:bedrock:*::foundation-model/anthropic.claude-*
                - !Sub arn:aws:bedrock:*:${AWS::AccountId}:inference-profile/eu.anthropic.claude-*
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource:
                - !Sub arn:aws:secretsmanager:${AWS::Region}:335400931736:secret:mirai-talent-scout/*

      Events:
        McpApi:
          Type: HttpApi
          Properties:
            ApiId: !Ref TalentScoutApi
            Path: /mcp
            Method: POST

  TalentScoutApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: prod
      Description: Mirai Talent Scout MCP endpoint
      CorsConfiguration:
        AllowOrigins: ['*']
        AllowHeaders: ['Content-Type', 'Authorization']
        AllowMethods: ['POST', 'OPTIONS']

  # ── Streaming Chat Agent ───────────────────────────────────────────────────
  # FastAPI + Lambda Web Adapter (ARM64 layer). InvokeMode: RESPONSE_STREAM
  # allows SSE events to reach the browser progressively during agent execution.
  # Auth is handled at the application layer (Bearer token middleware in FastAPI).
  AgentStreamFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: mirai-agent-stream
      Handler: run.sh
      Description: Mirai streaming chat agent — FastAPI + Lambda Web Adapter SSE
      AutoPublishAlias: live
      ProvisionedConcurrencyConfig:
        ProvisionedConcurrentExecutions: 1
      Environment:
        Variables:
          AWS_LAMBDA_EXEC_WRAPPER: /opt/bootstrap
          AWS_LWA_INVOKE_MODE: response_stream
          PORT: "8000"
      Layers:
        # Lambda Web Adapter — ARM64 (Graviton2). Bump version periodically.
        # Latest: https://github.com/awslabs/aws-lambda-web-adapter/releases
        - !Sub arn:aws:lambda:${AWS::Region}:753240598075:layer:LambdaAdapterLayerArm64:27
      FunctionUrlConfig:
        AuthType: NONE          # LWA requires NONE; auth is in FastAPI middleware
        InvokeMode: RESPONSE_STREAM
        Cors:
          AllowOrigins: ['*']
          AllowHeaders: ['Content-Type', 'Authorization']
          AllowMethods: ['*']
      Policies:
        - AWSLambdaBasicExecutionRole
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
                - bedrock:InvokeModelWithResponseStream
              Resource:
                # Cross-region inference profiles (eu.*) route to any EU region — wildcard region required.
                - arn:aws:bedrock:*::foundation-model/anthropic.claude-*
                - !Sub arn:aws:bedrock:*:${AWS::AccountId}:inference-profile/eu.anthropic.claude-*
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource:
                - !Sub arn:aws:secretsmanager:${AWS::Region}:335400931736:secret:mirai-talent-scout/*

Outputs:
  McpEndpoint:
    Description: MCP service endpoint — add to Claude Desktop or call directly
    Value: !Sub https://${TalentScoutApi}.execute-api.${AWS::Region}.amazonaws.com/prod/mcp

  AgentStreamUrl:
    Description: Streaming chat agent endpoint — set as STREAM_URL in ui/index.html
    Value: !GetAtt AgentStreamFunctionUrl.FunctionUrl

  FunctionArn:
    Description: Lambda function ARN
    Value: !GetAtt TalentScoutFunction.Arn
